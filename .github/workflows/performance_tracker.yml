name: Quantex Performance Tracker

on:
  repository_dispatch:
    types: [performance-tracker]

  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Performance Tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SIGNAL_GROUPS: ${{ secrets.TELEGRAM_SIGNAL_GROUPS }}
          TELEGRAM_ADMIN_GROUPS: ${{ secrets.TELEGRAM_ADMIN_GROUPS }}
        run: python performance_tracker.py

      - name: Commit performance data
        if: always()
        run: |
          git config user.name "Quantex Bot"
          git config user.email "bot@quantex.local"
          git add quantex_logs/performance.json -f
          git diff --cached --quiet || git commit -m "Performance update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
