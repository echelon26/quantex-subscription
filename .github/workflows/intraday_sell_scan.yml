name: Quantex Intraday Sell Scanner

# Runs at 11:30 AM IST Mon-Fri (06:00 UTC).
# F&O universe only, Kite-only (strict — no yfinance fallback).
# Surfaces short setups with VWAP rejection + Stage 3/4 + RS-negative.
# MIS intraday — HARD square-off by 3:15 PM IST.
# Output: admin chat + personal only.

on:
  workflow_dispatch:

  repository_dispatch:
    types: [intraday-sell-scanner]

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Intraday Sell Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_GROUPS: ${{ secrets.TELEGRAM_ADMIN_GROUPS }}
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
          ZERODHA_USER_ID: ${{ secrets.ZERODHA_USER_ID }}
          ZERODHA_PASSWORD: ${{ secrets.ZERODHA_PASSWORD }}
          ZERODHA_TOTP_KEY: ${{ secrets.ZERODHA_TOTP_KEY }}
        run: python intraday_sell_scanner.py

      - name: Commit results
        if: always()
        run: |
          git config user.name "Quantex Bot"
          git config user.email "bot@quantex.local"
          git add quantex_logs/intraday_sell_picks.json -f || true
          git add quantex_logs/recommendations.json -f || true
          git diff --cached --quiet || git commit -m "Intraday sell scan: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main || true
          git push || true
