name: Quantex Vol Expansion Scanner

# Catches Stage 1 → Stage 2 transition breakouts:
# • Body ≥ +5%, Vol ≥ 3× of 20-day avg, Range ≥ 1.5× ATR
# • Above 200-DMA but 50-DMA still below or just crossing (post-base entries)
# • 52w drawdown ≥ 25% (real recovery, not momentum extension)
#
# Complements Pocket Pivot (which buys later in confirmed Stage 2 trends).
# Best entries: stocks like CARTRADE that just broke out of a long base on volume.
#
# Output: admin chat + personal only (NOT subscriber signal group) until
# 2-3 weeks of paper-tracking validates the hit rate.

on:
  workflow_dispatch:

  repository_dispatch:
    types: [vol-expansion-scanner]

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Vol Expansion Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_GROUPS: ${{ secrets.TELEGRAM_ADMIN_GROUPS }}
          # Kite Connect — live data (Kite -> yfinance fallback via data_source.py)
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
          ZERODHA_USER_ID: ${{ secrets.ZERODHA_USER_ID }}
          ZERODHA_PASSWORD: ${{ secrets.ZERODHA_PASSWORD }}
          ZERODHA_TOTP_KEY: ${{ secrets.ZERODHA_TOTP_KEY }}
        run: python vol_expansion_scanner.py

      - name: Commit results
        if: always()
        run: |
          git config user.name "Quantex Bot"
          git config user.email "bot@quantex.local"
          git add quantex_logs/vol_expansion_picks.json -f || true
          git add quantex_logs/recommendations.json -f || true
          git diff --cached --quiet || git commit -m "Vol expansion scan: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main || true
          git push || true
