name: Quantex BTST Scanner

# Runs at 3:20 PM IST Mon-Fri (9:50 UTC).
# Surfaces overnight setups for next-day exit by 11 AM IST.
# Score threshold 65, max 5 signals/day.
# Output: admin chat + personal only (NOT subscriber signal group).

on:
  workflow_dispatch:

  repository_dispatch:
    types: [btst-scanner]

  # schedule:
  #   - cron: '50 9 * * 1-5'   # 3:20 PM IST, Mon-Fri

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run BTST Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_GROUPS: ${{ secrets.TELEGRAM_ADMIN_GROUPS }}
        run: python btst_scanner.py

      - name: Commit results
        if: always()
        run: |
          git config user.name "Quantex Bot"
          git config user.email "bot@quantex.local"
          git add quantex_logs/btst_picks.json -f || true
          git add quantex_logs/recommendations.json -f || true
          git diff --cached --quiet || git commit -m "BTST scan: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main || true
          git push || true
