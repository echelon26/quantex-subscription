name: Quantex Pro Scanner

on:
  repository_dispatch:
    types: [swing-scan]

  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Quantex Pro Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SIGNAL_GROUPS: ${{ secrets.TELEGRAM_SIGNAL_GROUPS }}
          TELEGRAM_ADMIN_GROUPS: ${{ secrets.TELEGRAM_ADMIN_GROUPS }}
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
          ZERODHA_USER_ID: ${{ secrets.ZERODHA_USER_ID }}
          ZERODHA_PASSWORD: ${{ secrets.ZERODHA_PASSWORD }}
          ZERODHA_TOTP_KEY: ${{ secrets.ZERODHA_TOTP_KEY }}
        run: python pro_scanner.py

      - name: Commit logs to repo
        if: always()
        run: |
          git config user.name "Quantex Scanner Bot"
          git config user.email "bot@quantex-scanner.local"
          git add quantex_logs/ -f
          git diff --cached --quiet || git commit -m "Pro scan results: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
